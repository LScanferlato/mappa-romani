</div>

function getMarkerColor(year) {
  if (year === null) return '#4ecca3';
  if (year < -100) return '#e94560';
  if (year < 0) return '#c9a959';
  if (year < 100) return '#4ecca3';
  return '#0fb9b1';
}

function getRadius(population) {
  if (!population) return 4;
  const minR = 3, maxR = 16;
  const minPop = 5000, maxPop = 1000000;
  const clamped = Math.max(minPop, Math.min(maxPop, population));
  const t = (clamped - minPop) / (maxPop - minPop);
  return minR + t * (maxR - minR);
}

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} a.C.`;
  return `${year} d.C.`;
}

function updateMap(year) {
  markerGroup.clearLayers();
  let count = 0;

  cities.forEach(city => {
    let active = false;
    const founded = city.founded || -5000;
    const conquered = city.conquered || null;

    if (conquered === null) {
      if (founded <= 0) {
        active = year >= founded;
      } else {
        active = year >= founded;
      }
    } else {
      if (conquered > 0 && founded > 0) {
        active = year >= conquered;
      } else if (conquered > 0 && founded < 0) {
        active = year >= conquered;
      } else if (conquered < 0 && founded < 0) {
        active = year >= conquered;
      } else {
        active = year >= conquered;
      }
    }

    if (city.name === "Costantinopoli") {
      active = year >= 330;
    }
    if (city.name === "Cartagine") {
      active = (year >= -146 && year <= 439) || (year >= -814 && year <= -146) || (year >= 533 && year <= 698);
      if (year >= -146 && year <= -121) active = false;
    }

    if (active) {
      count++;
      const color = getMarkerColor(city.conquered);
      const cityPop = pop[city.name] || 0;
      const radius = getRadius(cityPop);

      const marker = L.circleMarker([city.lat, city.lng], {
        radius: radius,
        fillColor: color,
        color: '#fff',
        weight: 1.5,
        opacity: 0.9,
        fillOpacity: 0.7
      }).addTo(markerGroup);

      const latin = latinNames[city.name] || city.name;
      let popupContent = `<h3>${city.name}</h3><div style="font-size:0.75rem;color:#c9a959;font-style:italic;margin-bottom:4px;">${latin}</div>`;
      if (city.founded && city.founded > -5000) {
        popupContent += `<div class="year-info"><span class="founded">Fondazione:</span> ${formatYear(city.founded)}</div>`;
      }
      if (city.conquered !== null) {
        popupContent += `<div class="year-info"><span class="conquered">Romanizzazione:</span> ${formatYear(city.conquered)}</div>`;
      }
      const cPop = pop[city.name];
      if (cPop) {
        popupContent += `<div class="year-info" style="margin-top:2px;"><span style="color:#a855f7;">Popolazione:</span> ${(cPop/1000).toFixed(0)}&thinsp;000 abitanti</div>`;
      }
      if (city.note) {
        popupContent += `<div style="margin-top:4px;font-size:0.8rem;color:#999;">${city.note}</div>`;
      }
      marker.bindPopup(popupContent);
    }
  });

  document.getElementById('city-count-value').textContent = count;

  siteGroup.clearLayers();
  if (showSites) {
    sites.forEach(site => {
      if (year >= site.year) {
        let color, symbol, prefix;
        if (site.type === 'port') {
          color = '#3b82f6'; prefix = '⚓';
        } else if (site.type === 'battle') {
          color = '#ef4444'; prefix = '⚔';
        } else {
          color = '#a855f7'; prefix = '★';
        }
        const icon = L.divIcon({
          className: 'site-marker',
          html: `<div style="background:${color};box-shadow:0 0 6px ${color}44,0 0 0 2px #fff;">${prefix}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          popupAnchor: [0, -15]
        });
        const latinSite = siteLatinNames[site.name] || '';
        const latinHtml = latinSite ? `<div style="font-size:0.75rem;color:#c9a959;font-style:italic;margin-bottom:4px;">${latinSite}</div>` : '';
        const sPop = pop[site.name];
        const popHtml = sPop ? `<div class="year-info" style="margin-top:2px;"><span style="color:#a855f7;">Popolazione:</span> ${(sPop/1000).toFixed(0)}&thinsp;000 abitanti</div>` : '';
        L.marker([site.lat, site.lng], { icon }).addTo(siteGroup)
          .bindPopup(`<h3>${prefix} ${site.name}</h3>${latinHtml}
            <div class="year-info"><span class="founded">Anno:</span> ${formatYear(site.year)}</div>${popHtml}
            <div style="margin-top:4px;font-size:0.8rem;color:#999;">${site.note}</div>
            <div style="margin-top:4px;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:${color};">${site.type === 'port' ? '🟦 Porto' : site.type === 'battle' ? '🟥 Battaglia' : '🟣 Sito storico'}</div>`);
      }
    });
  }

  roadGroup.clearLayers();
  if (showRoads) {
    roads.forEach(road => {
      const roadEnd = road.byzantine_end && year > 476 ? road.byzantine_end : road.end;
      if (year >= road.built && year <= roadEnd) {
        const isFrancigena = road.name === "Via Francigena (Toscana)";
        const isByzantine = road.byzantine_end && year > 476;
        const polyline = L.polyline(road.coords, {
          color: isFrancigena ? '#e94560' : (isByzantine ? '#a855f7' : '#c9a959'),
          weight: isFrancigena ? 3 : 2,
          opacity: isByzantine ? 0.6 : 0.5,
          dashArray: isFrancigena ? null : (isByzantine ? null : '6, 6')
        }).addTo(roadGroup);

        polyline.bindPopup(`<h3>${road.name}</h3><div class="year-info"><span class="founded">Costruzione:</span> ${formatYear(road.built)}</div>`);

        const midIdx = Math.floor(road.coords.length / 2);
        const mid = road.coords[midIdx];
        const next = road.coords[midIdx + 1] || road.coords[midIdx - 1];
        if (mid && next) {
          const angle = Math.atan2(next[1] - mid[1], next[0] - mid[0]) * 180 / Math.PI;
          const icon = L.divIcon({
            className: 'road-label',
            html: `<div style="transform:rotate(${angle}deg)">${road.name}</div>`,
            iconSize: [0, 0],
            iconAnchor: [0, 0]
          });
          L.marker(mid, {
            icon: icon,
            interactive: false,
            keyboard: false
          }).addTo(roadGroup);
        }
      }
    });
  }

  document.querySelectorAll('.province-label').forEach(el => el.remove());
  provinces.forEach(p => {
    let active = false;
    if (year >= p.controlled[0] && year <= p.controlled[1]) active = true;
    if (!active && p.byzantine && year >= p.byzantine[0] && year <= p.byzantine[1]) active = true;
    if (active) {
      const isByzantine = p.byzantine && year >= p.byzantine[0] && year <= p.byzantine[1];
      const latShift = p.name === "Italia" ? 1.5 : (p.name === "Aegyptus" ? -2 : 0);
      const labelColor = isByzantine ? '#a855f7' : '#8b949e';
      const labelBorder = isByzantine ? 'rgba(168,85,247,0.2)' : 'rgba(139,148,158,0.15)';
      const icon = L.divIcon({
        className: 'province-label',
        html: `<div style="font-family:'Cinzel',serif;font-size:0.6rem;color:${labelColor};text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 4px #000,0 0 8px #000,0 0 12px #000;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:3px;border:1px solid ${labelBorder};opacity:0.5;white-space:nowrap;">${p.name}</div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 0]
      });
      L.marker([p.lat + latShift, p.lng], { icon, interactive: false, keyboard: false }).addTo(map);
    }
  });

  const eventEl = document.getElementById('event-display');
  const pastEvents = romanEvents.filter(e => e.year <= year);
  const futureEvents = romanEvents.filter(e => e.year >= year);
  const prevEvent = pastEvents.length > 0 ? pastEvents[pastEvents.length - 1] : null;
  const nextEvent = futureEvents.length > 0 ? futureEvents[0] : null;
  let eventText = '';
  if (prevEvent && Math.abs(prevEvent.year - year) <= 3) {
    eventText = `${prevEvent.event}`;
  } else if (prevEvent && nextEvent && prevEvent !== nextEvent) {
    eventText = `${prevEvent.event}`;
  } else if (prevEvent) {
    eventText = prevEvent.event ? `${prevEvent.event}` : '';
  }
  if (eventText !== eventEl.dataset.lastEvent) {
    eventEl.dataset.lastEvent = eventText;
    eventEl.classList.remove('has-event');
    if (eventText) {
      eventEl.textContent = `📜 ${eventText}`;
      void eventEl.offsetWidth;
      eventEl.classList.add('has-event');
    } else {
      eventEl.textContent = '';
    }
  }
}

const slider = document.getElementById('year-slider');
const yearDisplay = document.getElementById('year-display');

function updateYearDisplay(year) {
  if (year < 0) {
    yearDisplay.textContent = `${Math.abs(year)} a.C.`;
    yearDisplay.className = 'bc';
  } else {
    yearDisplay.textContent = `${year} d.C.`;
    yearDisplay.className = 'ad';
  }
  const badge = document.getElementById('era-badge');
  if (year <= -509) {
    badge.textContent = 'Regno';
    badge.className = 'era-badge regnum';
  } else if (year <= -27) {
    badge.textContent = 'Repubblica';
    badge.className = 'era-badge respublica';
  } else if (year <= 476) {
    badge.textContent = 'Impero';
    badge.className = 'era-badge imperium';
  } else {
    badge.textContent = 'Impero d\'Oriente';
    badge.className = 'era-badge byzantium';
  }
  const dynastyEl = document.getElementById('dynasty-badge');
  let found = '';
  for (const d of dynasties) {
    if (year >= d.start && year < d.end) { found = d.name; break; }
  }
  if (found) {
    dynastyEl.textContent = found;
    dynastyEl.style.display = 'inline';
  } else {
    dynastyEl.style.display = 'none';
  }
}

function handleSliderChange() {
  const year = parseInt(this.value);
  updateYearDisplay(year);
  updateMap(year);
}

slider.addEventListener('input', handleSliderChange);
slider.addEventListener('change', handleSliderChange);

document.getElementById('roads-checkbox').addEventListener('change', function() {
  showRoads = this.checked;
  const year = parseInt(slider.value);
  updateMap(year);
});
document.getElementById('sites-checkbox').addEventListener('change', function() {
  showSites = this.checked;
  const year = parseInt(slider.value);
  updateMap(year);
});

const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', '');
  div.innerHTML = `
    <div class="legend">
      <div class="legend-title">Legenda</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e94560;"></span>Città (conquista &lt;100 a.C.)</div>
      <div class="legend-item"><span class="legend-dot" style="background:#c9a959;"></span>Città (repubblicane)</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4ecca3;"></span>Città (imperiali I sec.)</div>
      <div class="legend-item"><span class="legend-dot" style="background:#0fb9b1;"></span>Città (imperiali II+ sec.)</div>
      <hr>
      <div class="legend-item"><span class="legend-icon" style="background:#3b82f6;">⚓</span> Porto</div>
      <div class="legend-item"><span class="legend-icon" style="background:#ef4444;">⚔</span> Battaglia</div>
      <div class="legend-item"><span class="legend-icon" style="background:#a855f7;">★</span> Sito storico</div>
      <hr>
      <div class="legend-item"><span class="legend-line" style="background:#c9a959;"></span> Strada romana</div>
      <div class="legend-item"><span class="legend-line" style="background:#e94560;height:3px;opacity:0.9;"></span> Via Francigena (medievale)</div>
      <div class="legend-item"><span class="legend-line" style="background:#a855f7;"></span> Strada bizantina</div>
    </div>`;
  return div;
};
legend.addTo(map);

const bibBtn = document.getElementById('bib-btn');
const bibPanel = document.getElementById('bib-panel');
const bibClose = document.getElementById('bib-close');
const bibList = document.getElementById('bib-list');
bibliography.forEach(b => {
  const a = document.createElement('a');
  a.href = b.url;
  a.target = '_blank';
  a.style.cssText = 'display:block;padding:6px 8px;color:#e6edf3;text-decoration:none;font-size:0.75rem;border-bottom:1px solid #21262d;transition:0.2s;border-radius:4px;';
  a.innerHTML = `<div style="font-weight:500;">${b.title}</div><div style="font-size:0.65rem;color:#8b949e;margin-top:2px;">${b.note}</div>`;
  a.addEventListener('mouseenter', () => { a.style.background = 'rgba(201,169,89,0.08)'; });
  a.addEventListener('mouseleave', () => { a.style.background = 'transparent'; });
  bibList.appendChild(a);
});
bibBtn.addEventListener('click', () => { bibPanel.style.display = 'block'; });
bibClose.addEventListener('click', () => { bibPanel.style.display = 'none'; });
bibPanel.addEventListener('click', (e) => { if (e.target === bibPanel) bibPanel.style.display = 'none'; });

const playBtn = document.getElementById('play-btn');
let playing = false;
let playInterval = null;
let SPEED = 60;
const speedBtn = document.getElementById('speed-btn');
const speeds = [60, 30, 15, 5];
let speedIdx = 0;
speedBtn.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  SPEED = speeds[speedIdx];
  speedBtn.textContent = speedIdx === 0 ? '1×' : speedIdx === 1 ? '2×' : speedIdx === 2 ? '4×' : '8×';
});

const itinereLayer = L.layerGroup().addTo(map);
let itinereLoaded = false;

document.getElementById('itinere-checkbox').addEventListener('change', function() {
  if (this.checked) {
    map.addLayer(itinereLayer);
  } else {
    map.removeLayer(itinereLayer);
  }
});

function loadItinereData() {
  if (itinereLoaded) return;
  itinereLoaded = true;
  const label = document.getElementById('itinere-label');
  label.style.opacity = '0.5';
  label.title = 'Caricamento dati Itiner-e in corso...';

  fetch('https://zenodo.org/api/records/17122148/files/itinere_roads.geojson/content')
    .then(r => r.json())
    .then(geo => {
      L.geoJSON(geo, {
        style: { color: '#a855f7', weight: 1, opacity: 0.4 },
        pointToLayer: () => null
      }).addTo(itinereLayer);
      label.style.opacity = '1';
      label.title = `Itiner-e: ${geo.features ? geo.features.length : '?'} segmenti stradali caricati`;
    })
    .catch(() => {
      label.style.opacity = '1';
      label.title = 'Errore caricamento dati Itiner-e';
      itinereLoaded = false;
    });
}

setTimeout(loadItinereData, 2000);

playBtn.addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? '⏸' : '▶';
  this.classList.toggle('playing', playing);
  if (playing) {
    if (parseInt(slider.value) >= 1453) slider.value = -753;
    playInterval = setInterval(() => {
      let y = parseInt(slider.value);
      if (y >= 1453) {
        clearInterval(playInterval);
        playing = false;
        playBtn.textContent = '▶';
        playBtn.classList.remove('playing');
        return;
      }
      y += 1;
      slider.value = y;
      updateYearDisplay(y);
      updateMap(y);
    }, SPEED);
  } else {
    clearInterval(playInterval);
  }
});

const initialYear = parseInt(slider.value);
updateYearDisplay(initialYear);
updateMap(initialYear);
</script>
</body>
