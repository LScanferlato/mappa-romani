# Workflow per pubblicare mappa-romani su GitHub Pages
name: Deploy mappa-romani to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r . _site/
          rm -rf _site/.git _site/.github
          # GitHub Pages usa index.html come pagina principale.
          # Nel repository il file principale sembra essere impero_romano.html.
          if [ -f _site/impero_romano.html ] && [ ! -f _site/index.html ]; then
            cp _site/impero_romano.html _site/index.html
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
``
